name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-app:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build MCP server
        run: |
          cd mcp-server
          npm ci
          npm run build

      - name: Copy MCP server to bundle location
        run: |
          mkdir -p tama-tauri/src-tauri/mcp-server-dist
          cp -r mcp-server/dist/* tama-tauri/src-tauri/mcp-server-dist/
          cp mcp-server/package.json tama-tauri/src-tauri/mcp-server-dist/
        shell: bash

      - name: Install UI dependencies and build
        run: |
          cd tama-tauri/ui
          npm ci
          npm run build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: tama-tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'tama96 ${{ github.ref_name }}'
          releaseBody: 'See the README for setup instructions.'
          releaseDraft: true
          args: --target ${{ matrix.target }} --config '{"build":{"beforeBuildCommand":""}}'

  build-tui:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            binary: tama-tui
            asset: tama-tui-aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
            binary: tama-tui
            asset: tama-tui-x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            binary: tama-tui
            asset: tama-tui-x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            binary: tama-tui.exe
            asset: tama-tui-x86_64-pc-windows-msvc.exe

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build TUI
        run: cargo build --release --target ${{ matrix.target }} -p tama-tui

      - name: Prepare binary
        shell: bash
        run: cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "${{ matrix.asset }}"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          files: ${{ matrix.asset }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
